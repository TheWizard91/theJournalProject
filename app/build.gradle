plugins {
    id 'com.android.application'
    id 'com.google.gms.google-services'
}

android {
    compileSdkVersion 30
    buildToolsVersion "30.0.3"

    defaultConfig {
        applicationId "com.thewizard91.thejournal"
        minSdkVersion 21
        targetSdkVersion 30
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {

    implementation 'androidx.appcompat:appcompat:1.2.0'
    implementation 'com.google.android.material:material:1.2.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
    testImplementation 'junit:junit:4.13.1'
    androidTestImplementation 'androidx.test.ext:junit:1.1.2'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.3.0'

    // Import the Firebase BoM
    implementation platform('com.google.firebase:firebase-bom:26.2.0')

    // Add the dependency for the Firebase SDK for Google Analytics
    // When using the BoM, don't specify versions in Firebase dependencies
    implementation 'com.google.firebase:firebase-analytics'

    // Add the dependencies for any other desired Firebase products
    // https://firebase.google.com/docs/android/setup#available-libraries

    //
    implementation 'com.google.firebase:firebase-database:19.6.0'
    implementation 'com.google.firebase:firebase-firestore:22.0.1'
    implementation 'com.google.firebase:firebase-storage:19.2.1'
    implementation 'com.google.firebase:firebase-messaging:21.0.1'
    implementation 'com.google.firebase:firebase-inappmessaging-display:19.1.3'
    implementation 'com.google.firebase:firebase-auth:20.0.1'

    // Button Animated
    implementation 'com.royrodriguez:transitionbutton:0.2.0'

    // CircleImageView
    implementation 'de.hdodenhof:circleimageview:3.1.0'

    // ChiliPhotoPicker
    implementation "com.github.ChiliLabs:ChiliPhotoPicker:0.3.1"

    // Android Image Cropper
    implementation 'com.theartofdev.edmodo:android-image-cropper:2.8.0'

    // Image zooming by click -- Android Image Popup
    implementation 'com.github.chathuralakmal:AndroidImagePopup:1.2.2'

    // image-zoom-view
    implementation 'com.github.hsmnzaydn:imagezoom:1.3.0'

    // Glide
    implementation 'com.github.bumptech.glide:glide:4.11.0'
    annotationProcessor 'com.github.bumptech.glide:compiler:4.11.0'

    // FrescoImageViewer USE THIS!
    implementation 'com.github.stfalcon:frescoimageviewer:0.5.0'
    implementation 'com.github.stfalcon:stfalcon-imageviewer:1.0.1'

    // PanoramaImageView
    implementation 'com.gjiazhe:PanoramaImageView:1.0'

    // Compressor
    implementation 'id.zelory:compressor:2.1.0'
//    implementation 'id.zelory:compressor:3.0.0'

    // Autocomplete for text.
    implementation("com.otaliastudios:autocomplete:1.1.0")

    // Side Menu
    implementation 'com.github.yalantis:Side-Menu.Android:1.0.2'
    implementation ('com.github.ozodrukh:CircularReveal:2.0.1@aar') {
        transitive = true;
    }

    // BoomMenu
    implementation 'com.nightonke:boommenu:2.1.1'

    // For Apache licence
    apply plugin: 'com.google.android.gms.oss-licenses-plugin'
    implementation 'com.google.android.gms:play-services-oss-licenses:17.0.0'

}